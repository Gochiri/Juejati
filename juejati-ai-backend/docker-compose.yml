version: '3.8'

services:
  juejati-ai-agent:
    image: ghcr.io/gochiri/juejati-ai-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=4000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - GHL_API_KEY=${GHL_API_KEY}
      - TOKKO_API_KEY=${TOKKO_API_KEY}
      - GHL_LOCATION_ID=${GHL_LOCATION_ID}
      - GHL_FROM_NUMBER=${GHL_FROM_NUMBER}
      - SYNC_SECRET=${SYNC_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SCRAPER_API_URL=http://zonaprop-scraper:3000/api/search
      - SCRAPER_PUBLIC_URL=https://catalogo.korvance.com
    networks:
      - korvancenet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.juejati-agent.rule=Host(`agent.korvance.com`)"
        - "traefik.http.routers.juejati-agent.entrypoints=websecure"
        - "traefik.http.routers.juejati-agent.tls=true"
        - "traefik.http.routers.juejati-agent.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.juejati-agent.loadbalancer.server.port=4000"
        - "traefik.docker.network=korvancenet"

networks:
  korvancenet:
    external: true
    name: korvancenet
