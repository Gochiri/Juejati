version: '3.8'

services:
  juejati-ai-agent:
    build: .
    image: juejati-ai-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=4000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - GHL_API_KEY=${GHL_API_KEY}
      - TOKKO_API_KEY=${TOKKO_API_KEY}
      - SCRAPER_API_URL=http://zonaprop-scraper:3000/api/search
    networks:
      - internal_swarm_network # Replace with your actual swarm network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  internal_swarm_network:
    external: true # Assumes you have a shared network between your postgres, scraper, and this container
