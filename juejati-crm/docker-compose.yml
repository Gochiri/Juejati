version: '3.8'

services:
  juejati-crm:
    image: ghcr.io/gochiri/juejati-crm:latest
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXTAUTH_URL=https://crm.korvance.com
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - GHL_API_KEY=${GHL_API_KEY}
      - GHL_LOCATION_ID=${GHL_LOCATION_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_GHL_LOCATION_ID=${GHL_LOCATION_ID}
    networks:
      - korvancenet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.juejati-crm.rule=Host(`crm.korvance.com`)"
        - "traefik.http.routers.juejati-crm.entrypoints=websecure"
        - "traefik.http.routers.juejati-crm.tls=true"
        - "traefik.http.routers.juejati-crm.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.juejati-crm.loadbalancer.server.port=3000"
        - "traefik.docker.network=korvancenet"

networks:
  korvancenet:
    external: true
    name: korvancenet
